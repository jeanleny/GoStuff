services:
  db:
    image: postgres:17
    container_name: clicker-db
    restart: unless-stopped
    
    env_file:
      - .env

    healthcheck:
      test: ["CMD-SHELL", "sh -c 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}'"]
      interval: 4s
      timeout: 3s
      retries: 3

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  migrations:
    image: migrate/migrate
    depends_on:
      db:
        condition: service_healthy
    volumes:
     - ./migrations:/migrations
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/clicker?sslmode=disable", "up"]

  api:
   build: ./server
   container_name: api
   depends_on:
     - db

   restart: unless-stopped
   ports:
     - "8080:8080"

volumes : 
  postgres_data:
  migrations:
